<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spelling Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff4e9;
      font-family: 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
    }

    .game-container {
      width: 800px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Time Bar ── */
    .time-bar-track {
      width: 100%;
      height: 26px;
      background: #fff4e9;
      border-radius: 0;
      border: 3px solid #414241;
      overflow: hidden;
    }

    .time-bar-fill {
      height: 100%;
      background: #414241;
      border-radius: 0;
      width: 100%;
      transition: width 0.1s linear;
    }

    /* ── HUD ── */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }

    .lives {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── Eyeball lives ── */
    .eyeball { display: block; overflow: visible; }

    .eyeball .pupil {
      transform-origin: 25px 25px;
      animation: lookAround 4s ease-in-out infinite;
    }

    .eyeball-0 .pupil { animation-delay: 0s; }
    .eyeball-1 .pupil { animation-delay: 1.3s; }
    .eyeball-2 .pupil { animation-delay: 2.6s; }

    .eyeball.dead-eye { animation: eyeDeath 0.3s ease forwards; }

    .score {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #414241;
      letter-spacing: 0;
    }

    /* ── Windows ── */
    .window {
      background: #fff4e9;
      border-radius: 0;
      border: 3px solid #414241;
      width: 100%;
    }

    .window-icon {
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-display {
      font-size: 180px;
      line-height: 1;
      user-select: none;
    }

    .icon-display.new {
      animation: iconPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .window-text {
      min-height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 36px 40px;
      cursor: text;
    }

    /* ── Letter Boxes ── */
    .letter-boxes {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .letter-box {
      width: 68px;
      height: 68px;
      border-radius: 0;
      border: 3px solid #414241;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif;
      font-size: 34px;
      font-weight: 900;
      color: #414241;
      text-transform: uppercase;
      background: #fff4e9;
      transition: border-color 0.15s, color 0.15s, transform 0.15s;
      user-select: none;
    }

    .letter-box.active {
      border-color: #414241;
      border-width: 4px;
      transform: scale(1.08);
    }

    .letter-box.correct {
      border-color: #414241;
      color: #414241;
      background: #d6f0d6;
      animation: letterPop 0.25s ease;
    }

    .letter-box.wrong {
      border-color: #414241;
      color: #414241;
      background: #f5d5d5;
      animation: shake 0.35s ease;
    }

    /* ── Hint text ── */
    .hint {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 15px;
      color: #41424180;
      letter-spacing: 0.01em;
    }

    /* ── Feedback ── */
    .feedback {
      font-family: 'Roboto', sans-serif;
      font-size: 24px;
      font-weight: 900;
      min-height: 36px;
      text-align: center;
      color: #414241;
    }

    .feedback.correct { color: #414241; }
    .feedback.wrong   { color: #414241; }

    /* ── Hidden input ── */
    .hidden-input {
      position: fixed;
      top: -999px;
      left: -999px;
      opacity: 0;
      width: 1px;
      height: 1px;
    }

    /* ── Overlays ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 244, 233, 0.97);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }

    /* ── Game Over Page (lives lost) ── */
    #gameOverPage {
      background: #FFF4E9;
      justify-content: space-between;
      gap: 0;
      padding: 0;
    }

    .go-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 40px 24px 0;
      width: 100%;
      max-width: 800px;
    }

    .go-font-svg {
      width: 100%;
      max-width: 680px;
      height: auto;
    }

    .go-score-wrap {
      text-align: center;
      margin-top: 12px;
    }

    .go-score-label {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 32px;
      color: #CC0514;
    }

    .go-score-number {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: clamp(80px, 17vw, 140px);
      color: #CC0514;
      line-height: 1;
    }

    .go-countdown {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #CC0514;
      opacity: 0.45;
      letter-spacing: 0.02em;
      margin-top: 4px;
    }

    .go-monster {
      width: 100%;
      max-width: 800px;
      flex-shrink: 0;
    }

    /* ── Score Page ── */
    #scorePage {
      background: #414241;
      justify-content: space-between;
      gap: 0;
      padding: 0;
    }

    .score-page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 24px 0;
      width: 100%;
      max-width: 800px;
    }

    .score-page-heading {
      text-align: center;
      line-height: 0.9;
    }

    .score-page-lets {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: clamp(80px, 15vw, 120px);
      color: #fff4e9;
      letter-spacing: -0.01em;
    }

    .score-page-go {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: clamp(120px, 22vw, 200px);
      color: #fff4e9;
      letter-spacing: -0.02em;
      line-height: 0.85;
    }

    .score-page-result {
      text-align: center;
      margin-top: 12px;
    }

    .score-page-label {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 32px;
      color: #fff4e9;
      opacity: 0.8;
    }

    .score-page-number {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: clamp(80px, 16vw, 130px);
      color: #fff4e9;
      line-height: 1;
    }

    .score-page-countdown {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #fff4e9;
      opacity: 0.5;
      letter-spacing: 0.02em;
    }

    .score-page-monster {
      width: 100%;
      max-width: 800px;
      flex-shrink: 0;
    }

    /* ── High Score Page ── */
    #highScorePage {
      background: #414241;
      justify-content: space-between;
      gap: 0;
      padding: 0;
    }

    .hs-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 40px 24px 0;
      width: 100%;
      max-width: 800px;
    }

    .hs-font-svg {
      width: 100%;
      max-width: 580px;
      height: auto;
    }

    .hs-score {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: clamp(80px, 17vw, 140px);
      color: #fff4e9;
      line-height: 1;
    }

    .hs-initials-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .hs-initials-label {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 18px;
      color: #fff4e9;
      opacity: 0.75;
    }

    .hs-initials-row {
      display: flex;
      gap: 20px;
    }

    .hs-box {
      width: 88px;
      height: 88px;
      background: #fff4e9;
      border: none;
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 60px;
      color: #414241;
      text-align: center;
      text-transform: uppercase;
      outline: none;
      cursor: pointer;
      caret-color: transparent;
    }

    .hs-box:focus {
      outline: 4px solid #fff4e9;
      outline-offset: 3px;
    }

    .hs-confirm-btn {
      margin-top: 12px;
      background: #fff4e9;
      color: #414241;
      border: none;
      padding: 14px 52px;
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 22px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s, transform 0.1s;
    }

    .hs-confirm-btn:hover  { opacity: 0.85; }
    .hs-confirm-btn:active { transform: scale(0.97); }

    .hs-monster {
      width: 100%;
      max-width: 800px;
      flex-shrink: 0;
    }

    /* ── Start screen splash layout ── */
    #startScreen {
      background: #fff4e9;
      justify-content: space-between;
      gap: 0;
      padding: 0;
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 60px 24px 0;
      width: 100%;
      max-width: 800px;
    }

    .splash-title {
      text-align: center;
    }

    .splash-spell-or {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 80px;
      color: #414241;
      line-height: 1.1;
    }

    .splash-die {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: clamp(100px, 20vw, 170px);
      color: #CC0000;
      line-height: 0.95;
      letter-spacing: -0.01em;
    }

    /* Splash leaderboard */
    #leaderboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 300px;
      gap: 0;
    }

    .lb-heading {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #414241;
      opacity: 0.4;
      margin-bottom: 10px;
    }

    .lb-list {
      list-style: none;
      margin: 0;
      padding: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .lb-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 1px 0;
    }

    .lb-rank {
      font-size: 10px;
      font-weight: 900;
      color: #414241;
      opacity: 0.3;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }

    .lb-initials {
      font-size: 16px;
      font-weight: 900;
      color: #414241;
      letter-spacing: 0.1em;
      flex: 1;
    }

    .lb-score {
      font-size: 16px;
      font-weight: 900;
      color: #414241;
    }

    .lb-row.lb-top1 .lb-initials,
    .lb-row.lb-top1 .lb-score { font-size: 28px; }
    .lb-row.lb-top1 .lb-rank  { font-size: 13px; opacity: 0.4; }

    .lb-row.lb-top2 .lb-initials,
    .lb-row.lb-top2 .lb-score { font-size: 22px; }
    .lb-row.lb-top2 .lb-rank  { font-size: 12px; }

    .lb-row.lb-top3 .lb-initials,
    .lb-row.lb-top3 .lb-score { font-size: 19px; }
    .lb-row.lb-top3 .lb-rank  { font-size: 11px; }

    .lb-empty-text {
      font-size: 14px;
      font-weight: 400;
      color: #414241;
      opacity: 0.45;
      letter-spacing: 0.02em;
    }

    /* Alright / LETS GO! button */
    .btn-start {
      background: #414241;
      border: none;
      border-radius: 0;
      padding: 14px 52px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-width: 285px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-start:hover  { opacity: 0.85; }
    .btn-start:active { transform: scale(0.97); }

    .btn-start-sub {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #fff4e9;
      line-height: 1.2;
    }

    .btn-start-main {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 42px;
      color: #fff4e9;
      line-height: 1.1;
    }

    /* Monster at bottom of splash */
    .splash-monster {
      width: 100%;
      max-width: 800px;
      align-self: center;
      flex-shrink: 0;
    }

    .overlay-emoji {
      font-size: 72px;
      line-height: 1;
    }

    .overlay h1 {
      font-family: 'Roboto', sans-serif;
      font-size: 52px;
      font-weight: 900;
      color: #414241;
      text-align: center;
    }

    .overlay p {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 20px;
      color: #414241;
      text-align: center;
      max-width: 480px;
      line-height: 1.5;
    }

    .overlay .final-score {
      font-family: 'Roboto', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #414241;
    }

    .btn {
      margin-top: 8px;
      background: #414241;
      color: #fff4e9;
      border: none;
      border-radius: 0;
      padding: 16px 52px;
      font-family: 'Roboto', sans-serif;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
      letter-spacing: 0.02em;
    }

    .btn:hover  { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    /* ── High score ── */
    .high-score-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: #fff4e9;
      border: 3px solid #414241;
      border-radius: 0;
      padding: 12px 36px;
    }

    .high-score-label {
      font-family: 'Roboto', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #41424180;
    }

    .high-score-value {
      font-family: 'Roboto', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #414241;
    }

    .high-score-initials {
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #41424180;
    }

    /* ── Initials entry ── */
    .initials-entry {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .initials-label {
      font-family: 'Roboto', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #414241;
      letter-spacing: 0.01em;
    }

    .initials-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .initials-input {
      width: 90px;
      height: 56px;
      border: 3px solid #414241;
      border-radius: 0;
      background: #fff4e9;
      font-family: 'Roboto', sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      color: #414241;
      letter-spacing: 0.15em;
      outline: none;
      transition: opacity 0.15s;
    }

    .initials-input:focus { opacity: 1; }

    .btn-confirm {
      width: 56px;
      height: 56px;
      border-radius: 0;
      border: 3px solid #414241;
      background: #414241;
      color: #fff4e9;
      font-size: 24px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-confirm:hover  { opacity: 0.8; }
    .btn-confirm:active { transform: scale(0.95); }

    /* ── NEXT button (pass) ── */
    .btn-pass {
      width: 100%;
      background: #414241;
      border: none;
      color: #fff4e9;
      border-radius: 0;
      padding: 18px 24px;
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
      text-align: center;
    }

    .btn-pass:hover  { opacity: 0.85; }
    .btn-pass:active { transform: scale(0.98); }

    .btn-pass strong {
      font-weight: 900;
    }

    /* ── Animations ── */
    @keyframes lookAround {
      0%   { transform: translate(0px,   0px);  }
      10%  { transform: translate(8px,  -3px);  }
      25%  { transform: translate(5px,   8px);  }
      40%  { transform: translate(-8px,  4px);  }
      55%  { transform: translate(-5px, -8px);  }
      70%  { transform: translate(7px,   3px);  }
      85%  { transform: translate(-3px,  7px);  }
      100% { transform: translate(0px,   0px);  }
    }

    @keyframes eyeDeath {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3) rotate(15deg); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-7px); }
      60%       { transform: translateX(7px); }
      80%       { transform: translateX(-4px); }
    }

    @keyframes letterPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    @keyframes iconPop {
      0%   { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes timerFlash {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<div class="game-container">

  <!-- Time Bar -->
  <div class="time-bar-track">
    <div class="time-bar-fill" id="timeBar"></div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="lives" id="lives"></div>
    <div class="score" id="score">Score: 0</div>
  </div>

  <!-- Icon Window -->
  <div class="window window-icon">
    <span class="icon-display" id="icon" role="img" aria-label="picture to spell"></span>
  </div>

  <!-- Spelling Window -->
  <div class="window window-text" id="windowText">
    <div class="letter-boxes" id="letterBoxes"></div>
    <div class="feedback" id="feedback"></div>
    <div class="hint" id="hint">Type on your keyboard to spell the picture above</div>
    <button class="btn-pass" id="passBtn">Screw it, <strong>NEXT!!!</strong></button>
  </div>

</div>

<!-- Hidden keyboard input -->
<input
  class="hidden-input"
  id="hiddenInput"
  autocomplete="off"
  autocorrect="off"
  autocapitalize="off"
  spellcheck="false"
>

<!-- Start Screen -->
<div class="overlay" id="startScreen">

  <div class="splash-content">
    <div class="splash-title">
      <div class="splash-spell-or">Spell or</div>
      <div class="splash-die">DIE!!!!</div>
    </div>
    <div id="leaderboard" style="display:none">
      <div class="lb-heading">High Scores</div>
      <ol id="leaderboardList" class="lb-list"></ol>
    </div>
    <button class="btn-start" id="startBtn">
      <span class="btn-start-sub">Alright</span>
      <span class="btn-start-main">LETS GO!</span>
    </button>
  </div>

  <!-- Monster from BG layer — exact paths from Paper -->
  <div class="splash-monster">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 660 800 440" preserveAspectRatio="xMidYMax meet" style="width:100%;display:block;">
      <polygon points="0 1100 800 1100 800 1055.16 0 860.08 0 1100" fill="#414241"/>
      <g>
        <circle cx="693.26" cy="779.42" r="56.66" fill="none" stroke="#414241" stroke-miterlimit="10" stroke-width="15.7"/>
        <circle cx="702.54" cy="804.87" r="12.72" fill="#414241"/>
      </g>
      <g>
        <circle cx="111.02" cy="747.72" r="56.66" fill="none" stroke="#414241" stroke-miterlimit="10" stroke-width="15.7"/>
        <circle cx="123.74" cy="727.79" r="12.72" fill="#414241"/>
      </g>
      <path d="M400.47,939.01l-7.14,60.1c-2.93,24.68-25.31,42.3-49.99,39.37l-59.85-7.11c-24.68-2.93-42.3-25.31-39.37-49.99l7.14-60.1,149.21,17.72Z" fill="#FFF4E9"/>

  const MUSIC = (() => {

          A5,_,G5,_,  E5,_,E5,_, C5,D5,E5,G5, A5,_,_,_,
          F5,A5,_,A5, F5,G5,E5,_, D5,E5,F5,_, G5,_,_,_,

        ],

          A3,_,_,_, A3,_,_,_, A3,_,_,_, A3,_,_,_,
          F3,_,_,_, F3,_,_,_, F3,_,_,_, F3,_,_,_,
          G3,_,_,_, G3,_,_,_, C3,_,_,_, C3,_,_,_,
        ],

          A5,_,E5,_, A5,G5,Fs5,_, E5,_,D5,_, E5,_,_,_,

        ],
        bas: [
          D3,_,_,_, D3,_,_,_, D3,_,_,_, D3,_,_,_,
          G3,_,_,_, G3,_,_,_, G3,_,_,_, G3,_,_,_,
          A3,_,_,_, A3,_,_,_, A3,_,_,_, A3,_,_,_,
          D3,_,_,_, D3,_,_,_, D3,_,_,_, D3,_,_,_,
        ],
      },
      { // 3 — Am–F–C–G (spooky minor)
        mel: [
          A5,_,_,E5, A5,_,G5,_, E5,G5,A5,_, E5,_,_,_,
          F5,A5,_,G5, F5,_,E5,_, C5,_,D5,F5, E5,_,_,_,
          C5,E5,G5,_, E5,_,C5,_, G5,_,A5,_, G5,E5,_,_,
          G5,_,F5,E5, D5,_,E5,_, G5,_,A5,_, G5,_,_,_,
        ],

          C3,_,_,_, C3,_,_,_, C3,_,_,_, C3,_,_,_,

        ],

          C5,E5,_,G5, C5,_,E5,_, G5,_,C5,_, E5,_,_,_,
          G5,_,D5,G5, B5,_,G5,_, D5,G5,_,_, G5,_,_,_,
          D5,F5,_,A5, D5,_,A5,_, F5,D5,_,_, E5,_,_,_,
        ],
        bas: [
          E3,_,_,_, E3,_,_,_, E3,_,_,_, E3,_,_,_,
          C3,_,_,_, C3,_,_,_, C3,_,_,_, C3,_,_,_,
          G3,_,_,_, G3,_,_,_, G3,_,_,_, G3,_,_,_,
          D3,_,_,_, D3,_,_,_, E3,_,_,_, E3,_,_,_,

        mel: [
          _,C5,_,E5, _,G5,_,E5, _,C5,E5,_, _,G5,_,_,
          _,F5,_,A5, _,F5,A5,_, _,G5,_,F5, _,E5,_,_,
          _,G5,_,B5, _,G5,_,D5, _,G5,D5,_, _,G5,_,_,
          _,E5,G5,_, C5,_,E5,_, G5,E5,_,C5, _,C5,_,_,
        ],
        bas: [
          C3,_,_,C3, _,_,C3,_, _,_,C3,_, _,_,C3,_,
          F3,_,_,F3, _,_,F3,_, _,_,F3,_, _,_,F3,_,
          G3,_,_,G3, _,_,G3,_, _,_,G3,_, _,_,G3,_,

        ],
      },
    ];

    // 16th-note duration in seconds, interpolating BPM 80→140 over 120s
    function s16() {
      const elapsed = ctx.currentTime - t0;
      const bpm = 80 + 60 * Math.min(1, elapsed / 120);
      return 15 / bpm;
    }

    function tone(freq, when, dur, type, vol) {
      if (!freq) return;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, when);
      g.gain.linearRampToValueAtTime(vol, when + 0.005);
      g.gain.setValueAtTime(vol, when + dur * 0.6);
      g.gain.linearRampToValueAtTime(0, when + dur * 0.95);
      osc.start(when); osc.stop(when + dur + 0.01);
    }

    function hihat(when) {
      if (!hatBuf) {
        const n = Math.floor(ctx.sampleRate * 0.05);
        hatBuf = ctx.createBuffer(1, n, ctx.sampleRate);
        const d = hatBuf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
      }
      const src = ctx.createBufferSource(), g = ctx.createGain(), f = ctx.createBiquadFilter();
      src.buffer = hatBuf; src.connect(f); f.connect(g); g.connect(ctx.destination);
      f.type = 'highpass'; f.frequency.value = 7000;
      g.gain.setValueAtTime(0.025, when);
      g.gain.exponentialRampToValueAtTime(0.001, when + 0.03);
      src.start(when); src.stop(when + 0.04);
    }

    function tick() {
      while (nextTime < ctx.currentTime + 0.12) {
        const d = s16(), i = step % 64;
        tone(activeMel[i], nextTime, d * 0.85, 'square', 0.10);
        tone(activeBas[i], nextTime, d * 1.6,  'square', 0.07);
        if (i % 4 === 0) hihat(nextTime); // quarter-note hi-hat click
        nextTime += d;
        step++;
      }
      if (running) timer = setTimeout(tick, 20);
    }

    return {
      start() {
        if (ctx) ctx.close();
        const song = SONGS[Math.floor(Math.random() * SONGS.length)];
        activeMel = song.mel; activeBas = song.bas;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        t0 = ctx.currentTime; step = 0; nextTime = t0 + 0.1; running = true; hatBuf = null;
        tick();
      },
      stop() {
        running = false; clearTimeout(timer);
        if (ctx) { ctx.close(); ctx = null; }
        hatBuf = null;
      }
    };
  })();

  // ── Config ─────────────────────────────────────────────────────────────────
  const GAME_DURATION = 120; // seconds
  const MAX_LIVES = 3;

  const livesEl      = document.getElementById('lives');

  const iconEl       = document.getElementById('icon');
  const letterBoxes  = document.getElementById('letterBoxes');
  const feedbackEl   = document.getElementById('feedback');
  const hintEl       = document.getElementById('hint');
  const passBtnEl    = document.getElementById('passBtn');
  const hiddenInput  = document.getElementById('hiddenInput');
  const startScreen  = document.getElementById('startScreen');
  const gameOverScr     = document.getElementById('gameOverScreen');

  const gameOverPageEl  = document.getElementById('gameOverPage');
  const highScorePageEl = document.getElementById('highScorePage');

  // ── Utilities ──────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function refillPool() {
    wordPool = shuffle(WORDS);
  }

  // ── Game control ───────────────────────────────────────────────────────────
  function startGame() {
    startScreen.style.display     = 'none';
    gameOverScr.style.display     = 'none';
    gameOverPageEl.style.display  = 'none';
    highScorePageEl.style.display = 'none';
    lives       = MAX_LIVES;
    score       = 0;
    timeLeft    = GAME_DURATION;
    gameActive  = true;
    gracePeriod = false;
    refillPool();
    updateHUD();
    updateTimerBar();
    nextWord();
    startTimer();
    MUSIC.start();
    hiddenInput.focus();
  }

  function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        clearInterval(timerInterval);
        updateTimerBar();
        if (typed.length > 0) {
          // Grace period: let them finish the word they've started
          gracePeriod = true;
          passBtnEl.style.display = 'none';
          showFeedback("Time's up — finish this word! ⏰", 'wrong');
          timeBarEl.style.animation = 'timerFlash 0.6s ease infinite';
        } else {
          endGame('time');
        }
      } else {
        updateTimerBar();
      }
    }, 100);
  }

  function nextWord() {
    if (wordPool.length === 0) refillPool();
    currentWord = wordPool.pop();
    typed = '';
    clearFeedback();
    renderBoxes();

    // Animate icon in
    iconEl.classList.remove('new');
    void iconEl.offsetWidth; // reflow
    iconEl.textContent = currentWord.icon;
    iconEl.setAttribute('aria-label', currentWord.word.toLowerCase());
    iconEl.classList.add('new');

    hintEl.style.display = '';
    passBtnEl.style.display = '';
    hiddenInput.value = '';
    hiddenInput.focus();
  }

  function passWord() {
    if (!gameActive || gracePeriod) return;
    clearTimeout(feedbackTimeout);
    showFeedback(`It was: ${currentWord.word}`, 'wrong');
    hintEl.style.display = 'none';
    passBtnEl.style.display = 'none';
    feedbackTimeout = setTimeout(nextWord, 1200);
  }

  async function endGame(reason) {
    clearInterval(timerInterval);
    gameActive = false;
    MUSIC.stop();

    const emoji = document.getElementById('gameOverEmoji');
    const title = document.getElementById('gameOverTitle');
    const msg   = document.getElementById('gameOverMsg');
    const fs    = document.getElementById('finalScore');

    if (reason === 'time') {
      emoji.textContent = '⏰';
      title.textContent = "Time's up!";
    } else {
      emoji.textContent = '💔';
      title.textContent = 'No more lives!';
    }

    fs.textContent = `Score: ${score}`;

    // Always fetch the live leaderboard before deciding — fixes cross-device divergence
    await loadHighScore();
    const board = _leaderboard;
    const isNewRecord = score > 0 && (board.length < 10 || score >= board[board.length - 1].score);

    if (isNewRecord) {
      document.getElementById('hsScore').textContent = score;
      document.getElementById('hsBox1').value = '';
      document.getElementById('hsBox2').value = '';
      document.getElementById('hsBox3').value = '';
      highScorePageEl.style.display = 'flex';
      setTimeout(() => document.getElementById('hsBox1').focus(), 150);
    } else {
      await loadHighScore();

      const showPageWithCountdown = (pageEl, numberElId, countdownElId) => {
        document.getElementById(numberElId).textContent = score;
        const countdownEl = document.getElementById(countdownElId);
        pageEl.style.display = 'flex';
        let secs = 5;
        countdownEl.textContent = `Returning in ${secs}…`;
        const iv = setInterval(() => {
          secs--;
          if (secs <= 0) {
            clearInterval(iv);
            pageEl.style.display = 'none';
            startScreen.style.display = 'flex';
          } else {
            countdownEl.textContent = `Returning in ${secs}…`;
          }
        }, 1000);
      };

      if (reason === 'lives') {
        showPageWithCountdown(gameOverPageEl, 'goScoreNumber', 'goCountdown');
      } else {
        showPageWithCountdown(scorePageEl, 'scorePageNumber', 'scorePageCountdown');
      }
    }
  }

  // ── Rendering ──────────────────────────────────────────────────────────────
  function renderBoxes(state) {
    // state: undefined | 'correct' | 'wrong'
    letterBoxes.innerHTML = '';
    for (let i = 0; i < currentWord.word.length; i++) {
      const box = document.createElement('div');
      box.className = 'letter-box';
      if (state) {
        box.classList.add(state);
      } else if (i === typed.length) {
        box.classList.add('active');
      }
      if (i < typed.length) box.textContent = typed[i];
      letterBoxes.appendChild(box);
    }
  }

  function makeEyeball(alive, index) {
    if (alive) {
      return `<svg class="eyeball eyeball-${index}" viewBox="0 0 50 50" width="46" height="46" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" r="21" fill="none" stroke="#414241" stroke-width="3"/>
        <circle class="pupil" cx="25" cy="25" r="9" fill="#414241"/>
      </svg>`;
    } else {
      return `<svg class="eyeball dead-eye" viewBox="0 0 50 50" width="46" height="46" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="25" r="21" fill="none" stroke="#414241" stroke-width="3"/>
        <line x1="13" y1="13" x2="37" y2="37" stroke="#414241" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="37" y1="13" x2="13" y2="37" stroke="#414241" stroke-width="3.5" stroke-linecap="round"/>
      </svg>`;
    }
  }

  function updateHUD() {
    livesEl.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = makeEyeball(i < lives, i);
      livesEl.appendChild(wrapper.firstChild);
    }
    scoreEl.textContent = 'Score: ' + score;
  }

  function updateTimerBar() {
    const pct = Math.max(0, (timeLeft / GAME_DURATION) * 100);
    timeBarEl.style.width = pct + '%';
  }

  function clearFeedback() {
    clearTimeout(feedbackTimeout);
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
  }

  function showFeedback(text, type) {
    feedbackEl.textContent = text;
    feedbackEl.className = 'feedback ' + type;
  }

  // ── Answer checking ────────────────────────────────────────────────────────
  function checkAnswer() {
    timeBarEl.style.animation = '';
    hintEl.style.display = 'none';
    passBtnEl.style.display = 'none';

    if (typed === currentWord.word) {
      score++;
      updateHUD();
      renderBoxes('correct');
      showFeedback('Correct! 🎉', 'correct');
      if (gracePeriod) {
        feedbackTimeout = setTimeout(() => endGame('time'), 900);
      } else {
        feedbackTimeout = setTimeout(nextWord, 900);
      }
    } else {
      if (gracePeriod) {
        // Wrong during grace period — game over, no life deducted
        renderBoxes('wrong');
        showFeedback(`So close! It was: ${currentWord.word}`, 'wrong');
        feedbackTimeout = setTimeout(() => endGame('time'), 1200);
      } else {
        lives--;
        updateHUD();
        renderBoxes('wrong');
        showFeedback('Oops! Try again 💪', 'wrong');
        feedbackTimeout = setTimeout(() => {
          if (lives <= 0) {
            endGame('lives');
          } else {
            typed = '';
            renderBoxes();
            clearFeedback();
            hintEl.style.display = '';
            passBtnEl.style.display = '';
          }
        }, 900);
      }
    }
  }

  // ── Keyboard handling ──────────────────────────────────────────────────────
  function handleKey(e) {
    if (!gameActive) return;
    const key = e.key.toUpperCase();

    if (e.key === 'Backspace') {
      if (typed.length > 0) {
        typed = typed.slice(0, -1);
        renderBoxes();
        clearFeedback();
        hintEl.style.display = '';
      }
      return;
    }

    if (!/^[A-Z]$/.test(key)) return;
    if (typed.length >= currentWord.word.length) return;

    typed += key;
    renderBoxes();
    hintEl.style.display = 'none';

    if (typed.length === currentWord.word.length) {
      checkAnswer();
    }
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  document.addEventListener('keydown', handleKey);

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('playAgainBtn').addEventListener('click', startGame);
  passBtnEl.addEventListener('click', passWord);

  // ── Leaderboard (Firebase Realtime Database, localStorage as offline fallback) ─
  const FB_URL = 'https://spell-or-die-default-rtdb.firebaseio.com/leaderboard.json';
  const LB_KEY = 'spellingGame_leaderboard';
  let _leaderboard = [];

  async function fetchLeaderboard() {
    const res = await fetch(FB_URL, { cache: 'no-store' });
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  }

  function showLeaderboard(board) {
    const el = document.getElementById('leaderboard');
    const list = document.getElementById('leaderboardList');
    if (!board || board.length === 0) {
      list.innerHTML = '<li class="lb-row lb-empty"><span class="lb-empty-text">No scores yet — be the first!</span></li>';
      el.style.display = 'flex';
      return;
    }
    list.innerHTML = '';
    board.forEach((entry, i) => {
      const li = document.createElement('li');
      const cls = i === 0 ? ' lb-top1' : i === 1 ? ' lb-top2' : i === 2 ? ' lb-top3' : '';
      li.className = 'lb-row' + cls;
      li.innerHTML =
        `<span class="lb-rank">${i + 1}</span>` +
        `<span class="lb-initials">${entry.initials || '???'}</span>` +
        `<span class="lb-score">${entry.score}</span>`;
      list.appendChild(li);
    });
    el.style.display = 'flex';
  }

  async function loadHighScore() {
    try {
      _leaderboard = await fetchLeaderboard();
      localStorage.setItem(LB_KEY, JSON.stringify(_leaderboard));
      showLeaderboard(_leaderboard);
      return _leaderboard.length > 0 ? _leaderboard[0].score : 0;
    } catch {
      try { _leaderboard = JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { _leaderboard = []; }
      showLeaderboard(_leaderboard);
      return _leaderboard.length > 0 ? _leaderboard[0].score : 0;
    }
  }

  async function saveHighScore(newScore, initials) {
    let board;
    try {
      board = await fetchLeaderboard();
    } catch {
      try { board = JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch { board = []; }
    }
    board.push({ score: newScore, initials });
    board.sort((a, b) => b.score - a.score);
    board = board.slice(0, 10);
    localStorage.setItem(LB_KEY, JSON.stringify(board));
    try {
      await fetch(FB_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(board),
      });
    } catch { /* silent fail — localStorage already updated */ }
    return true;
  }

  // High Score Page — three-box initials entry
  async function confirmHighScore() {
    const b1 = document.getElementById('hsBox1').value.trim().toUpperCase().replace(/[^A-Z]/g, '') || '?';
    const b2 = document.getElementById('hsBox2').value.trim().toUpperCase().replace(/[^A-Z]/g, '') || '?';
    const b3 = document.getElementById('hsBox3').value.trim().toUpperCase().replace(/[^A-Z]/g, '') || '?';
    const initials = b1 + b2 + b3;
    highScorePageEl.style.display = 'none';
    await saveHighScore(score, initials);
    await loadHighScore();
    startScreen.style.display = 'flex';
  }

  // Auto-advance between boxes
  ['hsBox1', 'hsBox2', 'hsBox3'].forEach((id, i, ids) => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      el.value = el.value.toUpperCase().replace(/[^A-Z]/g, '').slice(-1);
      if (el.value && i < ids.length - 1) {
        document.getElementById(ids[i + 1]).focus();
      }
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !el.value && i > 0) {
        document.getElementById(ids[i - 1]).focus();
      }
      if (e.key === 'Enter') confirmHighScore();
    });
  });

  document.getElementById('hsConfirmBtn').addEventListener('click', confirmHighScore);

  // Load on startup
  loadHighScore();

  document.getElementById('windowText').addEventListener('click', () => {
    hiddenInput.focus();
  });

  hiddenInput.addEventListener('blur', () => {
    if (gameActive) hiddenInput.focus();
  });
</script>
</body>
</html>
